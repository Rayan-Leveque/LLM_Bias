# config.yml
# Configuration for Behavioral Bias Pipeline v3
# Ethnicity × Location × Job Application × Paris Tech × Mid-level
# Hardware: 3x RTX 5090 (32GB each) = 96GB total VRAM

# ============================================================================
# HARDWARE CONFIGURATION
# ============================================================================
hardware:
  num_gpus: 3
  gpu_model: "RTX 5090"
  vram_per_gpu: 32  # GB
  total_vram: 96    # GB

# ============================================================================
# vLLM CONFIGURATION
# ============================================================================
vllm:
  base_url: "http://localhost:8000/v1"
  api_key: "not-needed"
  gpu_memory_utilization: 0.90
  max_model_len: 4096

# ============================================================================
# PIPELINE SETTINGS
# ============================================================================
pipeline:
  n_profiles: 50
  n_iat_iterations: 50
  max_retries: 3
  seed: 42
  log_file: "logs/raw_responses.jsonl"
  output_dir: "data/results/"

# ============================================================================
# MODEL DEFINITIONS
# ============================================================================
# All models run locally via vLLM with tensor_parallel_size only.
# tensor_parallel_size must be <= 2 (fits in 2 GPUs).

models:
  - name: "Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled"
    display_name: "Qwen3.5-27B"
    tensor_parallel_size: 2
    enabled: true
    gpu_memory_utilization: 0.90

  - name: "mistralai/Mistral-Small-3.2-24B-Instruct-2506"
    display_name: "Mistral-Small-3.2-24B"
    tensor_parallel_size: 2
    enabled: true
    gpu_memory_utilization: 0.90

  - name: "openai/gpt-oss-20b"
    display_name: "gpt-oss-20B"
    tensor_parallel_size: 2
    enabled: true
    gpu_memory_utilization: 0.90

  - name: "unsloth/gemma-4-31B-it-GGUF"
    display_name: "Gemma-4-31B-it-GGUF"
    tensor_parallel_size: 2
    enabled: false
    gpu_memory_utilization: 0.90

  - name: "nvidia/Nemotron-Cascade-2-30B-A3B"
    display_name: "Nemotron-Cascade-2-30B-A3B"
    tensor_parallel_size: 2
    enabled: false
    gpu_memory_utilization: 0.90

  - name: "zai-org/GLM-4.7-Flash"
    display_name: "GLM-4.7-Flash"
    tensor_parallel_size: 2
    enabled: false
    gpu_memory_utilization: 0.90

# ============================================================================
# STEP PARAMETERS
# ============================================================================
generation:
  model: "Mistral-Small-3.2-24B"  # local model for CV generation
  temperature: 0.9
  max_tokens: 1500

single_eval:
  temperature: 0.0
  max_tokens: 800

comparative_eval:
  temperature: 0.0
  max_tokens: 1000

iat:
  temperature: 0.0
  max_tokens: 150
  label_variants:
    variant_a: "proper_names"
    variant_b: "ethnonyms_tbd"
    variant_c: "geographic"

# ============================================================================
# EXPERIMENT: Ethnicity × SES (school fixed)
# ============================================================================
experiment:
  name: "ethnicity_ses"
  factors:
    ethnicity: ["french", "maghrebin", "african"]
    address: ["rich", "poor"]
  school: "fixed"  # drawn once per profile, not varied

# ============================================================================
# DEBUGGING
# ============================================================================
debug:
  enabled: false
  debug_iterations: 5
  debug_profiles: 3
  debug_models:
    - "Mistral-Small-3.2-24B"
