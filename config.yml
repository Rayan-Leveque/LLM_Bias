# config.yml
# Configuration for Behavioral Bias Pipeline v2
# Sexuality x Job Application x Paris Tech x Mid-level
# Hardware: 3x RTX 5090 (32GB each) = 96GB total VRAM

# ============================================================================
# HARDWARE CONFIGURATION
# ============================================================================
hardware:
  num_gpus: 3
  gpu_model: "RTX 5090"
  vram_per_gpu: 32  # GB
  total_vram: 96    # GB

# ============================================================================
# CLAUDE API CONFIGURATION
# ============================================================================
claude:
  model: "claude-sonnet-4-6"
  api_key_env: "ANTHROPIC_API_KEY"
  call_limit: 500

# ============================================================================
# vLLM CONFIGURATION
# ============================================================================
vllm:
  base_url: "http://localhost:8000/v1"
  api_key: "not-needed"
  gpu_memory_utilization: 0.90
  max_model_len: 4096

# ============================================================================
# PIPELINE SETTINGS
# ============================================================================
pipeline:
  n_profiles: 50
  n_iat_iterations: 50
  max_retries: 3
  seed: 42
  log_file: "logs/raw_responses.jsonl"
  output_dir: "data/results/"

# ============================================================================
# MODEL DEFINITIONS
# ============================================================================
# Each model requires:
#   name                    : HuggingFace model identifier
#   display_name            : Short name for outputs / CLI --models flag
#   tensor_parallel_size    : GPUs for tensor parallelism
#   pipeline_parallel_size  : GPUs for pipeline parallelism
#   enabled                 : Whether to run this model
#
# Optional fields:
#   gpu_memory_utilization  : Override default memory usage
#   max_model_len           : Override default context length
#   quantization            : Quantization method (awq, gptq, etc.)
#   notes                   : Human-readable description

models:
  # --- API model ---
  - name: "claude-sonnet-4-6"
    display_name: "claude-sonnet-4-6"
    type: "api"
    enabled: false
    notes: "Claude Sonnet 4.6 via Anthropic API (~$2.66 for full run)"

  # --- Local models (vLLM) ---
  - name: "mistralai/Mistral-Small-3.2-24B-Instruct-2506"
    display_name: "mistral"
    tensor_parallel_size: 2
    pipeline_parallel_size: 1
    enabled: true
    revision: null
    gpu_memory_utilization: 0.90
    notes: "Mistral Small 3.2 24B, 2 GPUs TP"

  - name: "microsoft/phi-4"
    display_name: "phi4"
    tensor_parallel_size: 1
    pipeline_parallel_size: 1
    enabled: false
    revision: null
    gpu_memory_utilization: 0.90
    notes: "Phi-4 14B — disabled"

  - name: "Qwen/Qwen3-30B-A3B-Instruct-2507-FP8"
    display_name: "qwen3"
    tensor_parallel_size: 1
    pipeline_parallel_size: 3
    enabled: true
    revision: null
    gpu_memory_utilization: 0.85
    notes: "Qwen3 30B MoE (3B active), FP8, 3 GPUs PP"

# ============================================================================
# STEP PARAMETERS
# ============================================================================
generation:
  model: "claude-sonnet-4-6"
  temperature: 0.9
  max_tokens: 1500

relational_injection:
  temperature: 0.7
  max_tokens: 500

single_eval:
  temperature: 0.0
  max_tokens: 800

comparative_eval:
  temperature: 0.0
  max_tokens: 1000

iat:
  temperature: 0.0
  max_tokens: 150
  label_variants:
    - gay_straight
    - homo_hetero

# ============================================================================
# SIGNAL CONDITIONS
# ============================================================================
signals:
  neutral:
    activites: []
    signal_injected: null

  explicit:
    activites:
      - "Bénévole chez SOS Homophobie (lutte contre l'homophobie) — 2 ans"
    signal_injected: "sos_homophobie"

  relational:
    signal_injected: "compagnon"
    # resume_narratif modified via LLM call

# ============================================================================
# DEBUGGING
# ============================================================================
debug:
  enabled: false
  debug_iterations: 5
  debug_profiles: 3
  debug_models:
    - claude-sonnet-4-6
